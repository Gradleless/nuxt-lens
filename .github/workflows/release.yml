name: Build & Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & zip Chrome
        run: npm run zip

      - name: Build & zip Firefox
        run: npm run zip:firefox

      - name: Rename Firefox zip to XPI
        run: mv .output/nuxtlens-*-firefox.zip .output/nuxtlens-firefox.xpi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} \
            .output/nuxtlens-*-chrome.zip \
            .output/nuxtlens-firefox.xpi \
            --clobber
